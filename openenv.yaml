spec_version: 1
name: disaster_response
type: space
runtime: fastapi
app: server.app:app
port: 8000

description: >
  Emergency Operations Center (EOC) triage agent environment.
  The agent allocates finite rescue and medical resources across
  multiple disaster zones, filtering genuine distress signals from
  noise and adversarial misinformation under time pressure.

domain: emergency-response

tasks:
  - name: task1_flood_easy
    description: "Single Zone Flood Triage — one residential zone, 75% real alerts, abundant resources."
    difficulty: easy
    max_steps: 30
    success_threshold: 0.75

  - name: task2_multizone_medium
    description: "Multi-Zone Flash Flood — three zones compete for limited resources, evacuation credits matter."
    difficulty: medium
    max_steps: 55
    success_threshold: 0.60

  - name: task3_compound_hard
    description: "Cascading Compound Disaster — five zones, 20% spoofed alerts, zone cascade mechanics, 8-step resource locks."
    difficulty: hard
    max_steps: 130
    success_threshold: 0.45

observation_space: DisasterObservation
action_space: DisasterAction

reward_range: [-1.0, 1.0]

baseline_model: meta-llama/Llama-3.1-8B-Instruct
